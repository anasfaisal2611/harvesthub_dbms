<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>HarvestHUB — Smart Agriculture Console</title>
  <link rel="stylesheet" href="styles.css?v=7" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script>
    // Apply theme as early as possible so there is no flash of the wrong color scheme.
    (function () {
      try {
        var saved = localStorage.getItem("harvesthub_theme");
        var theme = saved === "light" || saved === "dark" ? saved : "dark";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body>
  <!-- ============================== TOAST ============================== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Harvest scene — plays before login (hidden when session restores) -->
  <div id="harvest-intro" class="harvest-intro" aria-hidden="false">
    <div class="harvest-intro__sky"></div>
    <div class="harvest-intro__glow"></div>
    <div class="harvest-intro__sun" aria-hidden="true"></div>
    <div class="harvest-intro__hills" aria-hidden="true"></div>
    <div class="harvest-intro__wheat" aria-hidden="true">
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
      <span class="harvest-intro__stalk"></span>
    </div>
    <div class="harvest-intro__grain" aria-hidden="true"></div>
    <div class="harvest-intro__brand">
      <div class="harvest-intro__logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"></path>
          <circle cx="12" cy="9" r="2.5"></circle>
        </svg>
      </div>
      <h1 class="harvest-intro__title">HarvestHUB</h1>
      <p class="harvest-intro__tagline">Fields wake. Data grows. Harvest begins.</p>
    </div>
  </div>

  <!-- ============================== AUTH SCREEN ============================== -->
  <section id="auth-screen" class="auth-screen">
    <div class="auth-bg-grid"></div>

    <!-- Cute leaf cliparts -->
    <svg class="auth-leaf top-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="leafGrad1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="var(--accent-soft)" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="var(--accent-dim)" stop-opacity="0.7"/>
        </linearGradient>
      </defs>
      <path d="M30 170 C 40 70, 110 30, 180 30 C 175 100, 130 165, 30 170 Z" fill="url(#leafGrad1)"/>
      <path d="M40 165 C 80 130, 130 90, 175 45" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none"/>
      <path d="M70 150 L 120 110" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>
      <path d="M90 160 L 140 120" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>
    </svg>
    <svg class="auth-leaf top-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 180 C 30 80, 100 20, 180 20 C 175 100, 110 175, 20 180 Z" fill="var(--accent)" opacity="0.55"/>
    </svg>
    <svg class="auth-leaf bottom-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M30 170 C 40 70, 110 30, 180 30 C 175 100, 130 165, 30 170 Z" fill="var(--accent-soft)" opacity="0.5"/>
      <path d="M40 165 C 80 130, 130 90, 175 45" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
    </svg>
    <svg class="auth-leaf bottom-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M20 180 C 30 80, 100 20, 180 20 C 175 100, 110 175, 20 180 Z" fill="var(--accent-dim)" opacity="0.55"/>
    </svg>

    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"></path>
            <circle cx="12" cy="9" r="2.5"></circle>
          </svg>
        </div>
        <div>
          <h1>HarvestHUB <span aria-hidden="true">🌱</span></h1>
          <p>Smart Agriculture Console — grow happy crops 🌾</p>
        </div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="register">Create account</button>
      </div>

      <!-- LOGIN -->
      <form id="login-form" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@farm.com" autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
        </label>
        <button class="btn btn-primary btn-block" type="submit">
          <span>Sign in</span>
        </button>
        <p class="auth-hint">Use your registered email & password.</p>
      </form>

      <!-- REGISTER -->
      <form id="register-form" class="auth-form hidden">
        <label class="field">
          <span>Full name</span>
          <input type="text" name="name" required placeholder="Jane Doe" minlength="2" />
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" required placeholder="you@farm.com" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" required placeholder="At least 6 characters" minlength="6" />
        </label>
        <label class="field">
          <span>Role</span>
          <select name="role" required>
            <option value="farmer">Farmer</option>
            <option value="agronomist">Agronomist</option>
            <option value="admin">Admin</option>
          </select>
        </label>
        <button class="btn btn-primary btn-block" type="submit">
          <span>Create account</span>
        </button>
      </form>
    </div>
  </section>

  <!-- ============================== APP SHELL ============================== -->
  <section id="app-shell" class="app-shell hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"></path>
            <circle cx="12" cy="9" r="2.5"></circle>
          </svg>
        </div>
        <div>
          <h2>HarvestHUB</h2>
          <span>v2.0</span>
        </div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Profile</span>
        </button>
        <button class="nav-item" data-view="fields">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22l10-20 10 20H2z"/><path d="M7 22h10"/></svg>
          <span>Fields</span>
        </button>
        <button class="nav-item" data-view="crop_cycles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          <span>Crop Cycles</span>
        </button>
        <button class="nav-item" data-view="regions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span>Regions</span>
        </button>
        <button class="nav-item" data-view="satellites">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l-3 3 5 5 3-3"/><path d="M16 8l3-3-5-5-3 3"/><path d="M9 7l8 8"/><path d="M14 4l6 6"/><path d="M4 14l6 6"/></svg>
          <span>Satellites</span>
        </button>
        <button class="nav-item" data-view="observations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/></svg>
          <span>Observations</span>
        </button>
        <button class="nav-item" data-view="weather">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
          <span>Weather</span>
        </button>
        <button class="nav-item" data-view="alerts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Alerts</span>
          <span class="badge" id="alert-badge" hidden></span>
        </button>
        <button class="nav-item" data-view="band_values">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          <span>Band Values</span>
        </button>
        <button class="nav-item" data-view="derived_metrics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Derived Metrics</span>
        </button>
        <button class="nav-item" data-view="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Users</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-pill" id="user-pill" role="button" tabindex="0" title="Open profile">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-info">
            <strong id="user-name">—</strong>
            <span id="user-role" class="role-tag">—</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-block" id="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="view-title">Dashboard</h2>
          <p id="view-subtitle" class="muted">Overview of your operation</p>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle light / dark mode" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="btn btn-secondary" id="refresh-btn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
          <button class="btn btn-primary hidden" id="new-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span id="new-btn-label">New</span>
          </button>
        </div>
      </header>

      <div class="view-container" id="view-container">
        <!-- views rendered here -->
      </div>
    </main>
  </section>

  <!-- ============================== MODAL ============================== -->
  <div id="modal-root" class="modal-root hidden">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal" role="dialog" aria-modal="true">
      <header class="modal-header">
        <h3 id="modal-title">Title</h3>
        <button class="icon-btn" data-close="1" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>
      <div class="modal-body" id="modal-body"></div>
      <footer class="modal-footer" id="modal-footer"></footer>
    </div>
  </div>

  <script src="api.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
